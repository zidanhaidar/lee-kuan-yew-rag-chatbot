services:
  app:
    build: .
    ports:
      - "3000:3000"
    environment:
      # Generation is optional — retrieval works without it.
      AI_GATEWAY_API_KEY: ${AI_GATEWAY_API_KEY:-}
      CHAT_MODEL: ${CHAT_MODEL:-anthropic/claude-sonnet-4-6}
      EMBEDDING_PROVIDER: ${EMBEDDING_PROVIDER:-local}
      EMBEDDING_MODEL: ${EMBEDDING_MODEL:-openai/text-embedding-3-small}

  # --- Optional: pgvector as an alternative vector store --------------------
  # Uncomment and implement the pgvector adapter in lib/vector-store.ts
  # (saveVectorStore / loadVectorStore / search) to use this instead of the
  # file-based store. See README "Swapping the vector store".
  #
  # pgvector:
  #   image: pgvector/pgvector:pg16
  #   environment:
  #     POSTGRES_USER: lky
  #     POSTGRES_PASSWORD: lky
  #     POSTGRES_DB: lky
  #   ports:
  #     - "5432:5432"
  #   volumes:
  #     - pgdata:/var/lib/postgresql/data
  #
  # volumes:
  #   pgdata:
